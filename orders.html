<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📦 Admin Panel</title>

<style>

body{
font-family:'Segoe UI',sans-serif;
background:linear-gradient(120deg,#f6f9fc,#e9eff5);
margin:0;
}

header{
background:linear-gradient(90deg,#ff6b00,#ff9c00);
color:white;
text-align:center;
padding:25px;
font-size:30px;
font-weight:bold;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.container{
width:90%;
max-width:1000px;
margin:30px auto;
}

.dashboard{
display:flex;
gap:20px;
flex-wrap:wrap;
margin-bottom:25px;
}

.card{
flex:1;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 6px 15px rgba(0,0,0,0.1);
text-align:center;
font-size:18px;
}

.orders{
display:grid;
gap:15px;
}

.order{
background:white;
padding:18px;
border-radius:12px;
box-shadow:0 6px 15px rgba(0,0,0,0.1);
border-left:6px solid #ff6b00;
}

button{
padding:8px 14px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.reset{
background:#ff6b00;
color:white;
margin-bottom:20px;
}

.reset:hover{
background:#e65c00;
}

.delete{
background:#ff3b3b;
color:white;
}

.delete:hover{
background:#d90000;
}

h2{
margin-top:0;
}

</style>
</head>

<body>

<header>📦 Snack Shop Admin Panel</header>

<div class="container">

<button class="reset" onclick="resetStock()">📦 Reset Stock</button>

<div class="dashboard">

<div class="card">
<b>📊 Total Orders</b>
<br>
<span id="orderCount">0</span>
</div>

<div class="card">
<b>💰 Total Money</b>
<br>
₾<span id="money">0</span>
</div>

</div>

<h2>🧾 Orders</h2>

<div class="orders" id="orders"></div>

</div>

<script>

function loadOrders(){

let orders=JSON.parse(localStorage.getItem("allOrders")||"[]")

const container=document.getElementById("orders")

container.innerHTML=""

let totalMoney=0

document.getElementById("orderCount").textContent=orders.length

orders.forEach((o,index)=>{

let items=""

o.items.forEach(i=>{
items+=`${i.name} x${i.qty}<br>`
})

totalMoney+=o.total

let div=document.createElement("div")

div.className="order"

div.innerHTML=`

<b>Order #${o.orderNumber}</b><br>
👤 Name: ${o.name}<br>
🏫 Class: ${o.class}<br>
🔒 Locker: ${o.locker}<br>
<br>
<b>Items:</b><br>
${items}
<br>
💰 Total: ₾${o.total}<br><br>

<button class="delete" onclick="deleteOrder(${index})">🗑 Delete</button>

`

container.appendChild(div)

})

document.getElementById("money").textContent=totalMoney

}

function deleteOrder(index){

let orders=JSON.parse(localStorage.getItem("allOrders")||"[]")

orders.splice(index,1)

localStorage.setItem("allOrders",JSON.stringify(orders))

loadOrders()

}

function resetStock(){

if(!confirm("Reset all stock to 6?")) return

let snacks=[

{name:"M&M's",price:5,stock:6},
{name:"Snickers",price:3,stock:6},
{name:"საღეჭი რეზინი",price:2,stock:6},
{name:"კოკაკოლა",price:6,stock:6},
{name:"Skittles",price:4,stock:6},
{name:"Tik Tak",price:3,stock:6}

]

localStorage.setItem("snackStock", JSON.stringify(snacks))

alert("Stock reset to 6")

}

loadOrders()

</script>

</body>
</html>
