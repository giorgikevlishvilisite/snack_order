<!DOCTYPE html>
<html>
<head>
<title>Snack Orders</title>
<style>
body{font-family:Arial;background:#f4f4f4;text-align:center;}
h1{margin-top:20px;}
#dropArea{border:2px dashed #ff6b00;padding:30px;margin:20px;width:80%;margin:auto;}
.order{background:white;padding:15px;margin:15px;border-radius:10px;box-shadow:0 0 10px rgba(0,0,0,0.1);text-align:left;}
</style>
</head>
<body>

<h1>Snack Orders</h1>
<div id="dropArea">Drag & Drop all order JSON files here</div>
<div id="ordersContainer"></div>

<script>
const dropArea=document.getElementById("dropArea");
const ordersContainer=document.getElementById("ordersContainer");

dropArea.addEventListener("dragover", e=>{e.preventDefault();});
dropArea.addEventListener("drop", e=>{
e.preventDefault();
const files=e.dataTransfer.files;
for(const file of files){
const reader=new FileReader();
reader.onload=function(evt){
try{
const order=JSON.parse(evt.target.result);
const div=document.createElement("div");
div.className="order";
let itemsText="";
order.items.forEach(it=>{itemsText+=`${it.name} x${it.qty}, `;});
div.innerHTML=`<b>Name:</b> ${order.name}<br>
<b>Class:</b> ${order.class}<br>
<b>Locker:</b> ${order.locker}<br>
<b>Items:</b> ${itemsText}<br>
<b>Total:</b> $${order.total.toFixed(2)}`;
ordersContainer.appendChild(div);
}catch(err){
console.error("Invalid file",file.name);
}
};
reader.readAsText(file);
}
});
</script>

</body>
</html>
