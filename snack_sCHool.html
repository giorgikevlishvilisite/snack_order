<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍿 School Snack Shop</title>
<style>
/* ===== General ===== */
body{
  font-family: 'Segoe UI', Arial, sans-serif;
  margin:0;
  background: linear-gradient(to bottom, #f0f0f5, #ffffff);
  text-align:center;
}
h2{color:#ff6b00; margin-bottom:10px;}

/* ===== Header ===== */
header{
  background: linear-gradient(90deg, #ff6b00, #ff9c00);
  color:white;
  padding:30px 10px;
  font-size:36px;
  font-weight:bold;
  text-shadow: 1px 1px 3px rgba(0,0,0,0.2);
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

/* ===== Products ===== */
.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:20px;
  width:90%;
  margin:30px auto;
}
.card{
  background:white;
  border-radius:15px;
  box-shadow:0 8px 20px rgba(0,0,0,0.1);
  padding:15px;
  transition: transform 0.3s, box-shadow 0.3s;
}
.card:hover{
  transform: translateY(-10px);
  box-shadow:0 12px 25px rgba(0,0,0,0.2);
}
.card img{
  width:100%;
  border-radius:12px;
}
.card button{
  margin-top:10px;
  padding:10px 15px;
  border:none;
  border-radius:8px;
  background:#ff6b00;
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}
.card button:hover{
  background:#e55a00;
}

/* ===== Cart ===== */
#cart{
  margin:30px auto;
  background:white;
  padding:25px;
  border-radius:15px;
  box-shadow:0 8px 20px rgba(0,0,0,0.1);
  max-width:350px;
}
#cart h3{
  margin-top:0;
}
#cart button{
  padding:12px 20px;
  background:#ff6b00;
  border:none;
  color:white;
  font-weight:bold;
  border-radius:8px;
  cursor:pointer;
  margin-top:10px;
}
#cart button:hover{background:#e55a00;}
#cart ul{list-style:none;padding-left:0; margin-bottom:0;}

/* ===== Order Popup ===== */
#orderPopup{
  display:none;
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  width:380px;
  max-width:90%;
  padding:25px;
  border-radius:20px;
  box-shadow:0 15px 35px rgba(0,0,0,0.25);
  text-align:center;
  animation: popup 0.3s ease-out;
}
@keyframes popup{
  0%{transform:translate(-50%,-50%) scale(0.8); opacity:0;}
  100%{transform:translate(-50%,-50%) scale(1); opacity:1;}
}
input{
  width:80%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:1px solid #ccc;
  font-size:15px;
}
#msg{color:red; font-weight:bold; margin-top:5px;}

/* ===== Locker Grid ===== */
.lockerGrid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin-top:10px;
}
.locker{
  width:60px;
  height:60px;
  background:#ddd;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  cursor:pointer;
  transition: all 0.2s;
}
.locker:hover{transform:scale(1.1);}
.locker.selected{
  background:#ff6b00;
  color:white;
  box-shadow:0 0 10px #ff6b00aa;
}

/* ===== Responsive ===== */
@media(max-width:500px){
  .locker{width:50px;height:50px;line-height:50px;}
}
</style>
</head>
<body>

<header>🍿 School Snack Shop</header>

<div class="products" id="products"></div>

<div id="cart">
<h3>Cart</h3>
<ul id="cartItems"></ul>
Total: $<span id="total">0</span><br>
<button onclick="openPopup()">Pay at School</button>
</div>

<div id="orderPopup">
<h3>Order Info</h3>
<input id="name" placeholder="Your name"><br>
<input id="cls" placeholder="Class (6A,6B,6G,6D,6E,6V)"><br>
<h4>Select Locker</h4>
<div class="lockerGrid" id="lockers"></div><br>
<button onclick="submitOrder()">Confirm Order</button>
<p id="msg"></p>
</div>

<script>
const snacks=[
{name:"Chips",price:2,img:"https://i.imgur.com/3QK5TXY.png"},
{name:"Chocolate",price:3,img:"https://i.imgur.com/Yzn1l9Y.png"},
{name:"Cookies",price:2.5,img:"https://i.imgur.com/J9zzhKc.png"},
{name:"Soda",price:1.5,img:"https://i.imgur.com/IZNFRyA.png"},
{name:"Candy",price:1,img:"https://i.imgur.com/N5tq2Qw.png"},
{name:"Popcorn",price:2,img:"https://i.imgur.com/8Mbt6Zl.png"}
];

let cart={}, locker=null;
const validClasses=["6A","6B","6G","6D","6E","6V"];
const maxPerSnack=3;

function renderProducts(){
const p=document.getElementById("products");
snacks.forEach((s,i)=>{
const div=document.createElement("div");
div.className="card";
div.innerHTML=`<img src="${s.img}" alt="${s.name}"><b>${s.name}</b><br>$${s.price}<br><button onclick="add(${i})">Add</button>`;
p.appendChild(div);
});
}

function add(i){
const item=snacks[i];
if(cart[item.name]){
  if(cart[item.name].qty>=maxPerSnack){
    alert(`You can only buy up to ${maxPerSnack} of ${item.name}`);
    return;
  }
  cart[item.name].qty++;
}else{
  cart[item.name]={price:item.price,qty:1};
}
updateCart();
}

function updateCart(){
const list=document.getElementById("cartItems"); list.innerHTML="";
let sum=0;
for(const k in cart){const d=cart[k]; list.innerHTML+=`<li>${k} x${d.qty}</li>`; sum+=d.price*d.qty;}
document.getElementById("total").textContent=sum.toFixed(2);
}

function openPopup(){
if(Object.keys(cart).length===0){alert("Cart is empty!"); return;}
document.getElementById("orderPopup").style.display="block";
}

function renderLockers(){
const g=document.getElementById("lockers");
for(let i=1;i<=16;i++){
const l=document.createElement("div"); l.className="locker"; l.textContent=i;
l.onclick=()=>{
document.querySelectorAll(".locker").forEach(x=>x.classList.remove("selected"));
l.classList.add("selected"); locker=i;
};
g.appendChild(l);
}
}

function submitOrder(){
const name=document.getElementById("name").value.trim();
let cls=document.getElementById("cls").value.trim().toUpperCase();
if(!name){document.getElementById("msg").textContent="Enter name";return;}
if(!validClasses.includes(cls)){document.getElementById("msg").textContent="Class must be 6A,6B,6G,6D,6E,6V";return;}
if(!locker){document.getElementById("msg").textContent="Select locker";return;}
let items=[], total=0;
for(const k in cart){const d=cart[k]; items.push({name:k,qty:d.qty,price:d.price}); total+=d.price*d.qty;}
let order={name:name,class:cls,locker:locker,items:items,total:total};
let allOrders=JSON.parse(localStorage.getItem("allOrders")||"[]");
allOrders.push(order); localStorage.setItem("allOrders",JSON.stringify(allOrders));
cart={}; locker=null; updateCart(); document.getElementById("orderPopup").style.display="none"; document.getElementById("msg").textContent="";
alert("Order saved! Bring $" + total.toFixed(2) + " to school.");
}

renderProducts(); renderLockers();
</script>
</body>
</html>
